<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout - Agri AI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #a8e063, #56ab2f);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .logout-container {
      background: #fff;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    h1 {
      color: #2f6627;
    }
    p {
      margin: 15px 0;
      color: #444;
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      margin-top: 20px;
      background: #56ab2f;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #2f6627;
    }
  </style>
</head>
<body>
  <div class="logout-container">
    <h1>👋 You’ve logged out</h1>
    <p>Thank you for using <strong>Agri AI</strong>. We hope our tools helped you grow smarter!</p>
    <a href="/login" class="btn">Login Again</a>
    <a href="/" class="btn">Go to Homepage</a>
  </div>
</body>
</html>
